<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <meta name="author" content="Lia Alvarez">
    <meta name="description" content="Um exemplo de caixa de alerta usando HTML e CSS.">
    <script src="https://kit.fontawesome.com/226ebfd27f.js" crossorigin="anonymous"></script>
    <title>Alert Box</title>
</head>

<body>
    <input type="checkbox" name="" id="check">
    <label class="show-button" for="check">Clique aqui</label>
    <div class="background"></div>
    <div class="alert-box">
        <div class="icon">
            <i class="fas fa-exclamation"></i>
        </div>
        <header>Confirme</header>
        <p>Você tem certeza que quer apagar essa foto?</p>
        <div class="btns">
            <label for="check">Sim</label>
            <label for="check">Cancelar</label>
        </div>
    </div>
</body>

</html>
